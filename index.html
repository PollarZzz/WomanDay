<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Você</title>
    
    <!-- Recursos externos -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    
    <!-- CSS Principal -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="relative w-screen h-screen">

    <!-- Fundo de gradiente mágico (invisível no início) -->
    <div id="bg-gradient" class="absolute inset-0 z-0 pointer-events-none"></div>

    <!-- Tela de Pintura (Canvas) onde a animação acontece -->
    <canvas id="canvas" class="absolute inset-0 z-10 block w-full h-full"></canvas>

    <!-- Interface Inicial -->
    <div id="ui-container" class="absolute inset-0 z-20 flex items-center justify-center px-4">
        <button id="btn-presente" class="bg-pink-100 border border-pink-300 text-pink-800 px-6 py-4 md:px-8 md:py-4 rounded-full text-xl md:text-2xl tracking-widest cursor-pointer outline-none hover:bg-pink-200 w-full max-w-xs text-center">
            Aceitar Presente
        </button>
    </div>

    <!-- Mensagem Final (invisível no início) -->
    <div id="mensagem-final" class="absolute top-[10%] left-0 w-full z-30 flex flex-col items-center justify-start opacity-0 pointer-events-none transition-opacity duration-[3000ms] text-center px-4">
        <div class="w-[95%] max-w-2xl bg-black/30 backdrop-blur-md px-4 py-6 md:px-8 md:py-6 rounded-3xl border border-white/20 shadow-[0_10px_30px_rgba(0,0,0,0.5)]">
            <h1 class="text-4xl sm:text-5xl md:text-7xl text-pink-200 font-semibold drop-shadow-[0_4px_4px_rgba(0,0,0,0.9)] mb-4 leading-tight">
                Feliz Dia das Mulheres
            </h1>
            <p class="text-lg sm:text-2xl md:text-3xl text-pink-100 italic drop-shadow-[0_3px_3px_rgba(0,0,0,0.9)]">
                Você faz o meu mundo florescer.
            </p>
        </div>
    </div>

    <!-- JavaScript Principal -->
    <script src="js/script.js"></script>
</body>
</html>
